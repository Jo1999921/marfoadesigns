<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marfoa Designs | Portfolio</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <nav class="container nav">
    <div class="logo">Marfoa Designs</div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="services.html">Services</a>
      <a class="active" href="portfolio.html">Portfolio</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
    </div>
  </nav>
</header>

<section class="section">
  <div class="container">
    <div class="section-title">
      <h1>Portfolio</h1>
      <p>Some sample flyer designs from Marfoa Designs.</p>
    </div>

    <div class="portfolio-grid">
      <div class="portfolio-item">
        <img src="flyer1.jpeg" alt="Flyer design 1" onclick="openLightbox('flyer1.jpeg')">
        <p>Event Poster</p>
      </div>

      <div class="portfolio-item">
        <img src="flyer2.jpeg" alt="Flyer design 2" onclick="openLightbox('flyer2.jpeg')">
        <p>Event Poster</p>
      </div>

      <div class="portfolio-item">
        <img src="flyer3.jpeg" alt="Flyer design 3" onclick="openLightbox('flyer3.jpeg')">
        <p>Event Poster</p>
      </div>

      <div class="portfolio-item">
        <img src="flyer4.jpeg" alt="Flyer design 4" onclick="openLightbox('flyer4.jpeg')">
        <p>Project Campaign Design</p>
      </div>
    </div>

    <p class="small-note center">
      Click any design to view it larger.
    </p>
  </div>
</section>

<div id="lightbox" class="lightbox" onclick="closeLightbox()">
  <span class="lightbox-close">&times;</span>
  <img class="lightbox-content" id="lightbox-img" alt="Expanded portfolio image">
</div>

<footer>
  <div class="container">
    <p>© 2026 Marfoa Designs. All rights reserved.</p>
  </div>
</footer>

<script>
  function openLightbox(imageSrc) {
    document.getElementById("lightbox").style.display = "flex";
    document.getElementById("lightbox-img").src = imageSrc;
  }

  function closeLightbox() {
    document.getElementById("lightbox").style.display = "none";
  }
</script>

</body>
</html>
